<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jingwei - V16 Stable Stone</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;padding:0;background:#000;color:#e8e4db;
  font-family:Georgia,'Times New Roman',serif;overflow-x:hidden;
}
body{height:780vh}
:root{--p:0;--end:0;--cameraY:0vh;--hint:1}

.scene{
  position:fixed;inset:0;overflow:hidden;
  background:linear-gradient(to bottom,#a2aaa4 0%,#71858a 22%,#173b4a 48%,#031521 74%,#000 100%);
}
.world{
  position:absolute;left:0;right:0;top:0;height:230vh;
  transform:translateY(var(--cameraY));will-change:transform;
}
.sky{z-index:1;
  position:absolute;left:0;right:0;top:0;height:53vh;
  background:
    linear-gradient(to bottom,rgba(255,255,255,.20),rgba(255,255,255,.02) 62%,rgba(25,78,92,.16)),
    url("assets/images/home/home-embedded-01.png");
  background-size:cover;
  background-position:center top;
  opacity:calc(1 - var(--p)*1.45);
}
.horizon{z-index:2;
  position:absolute;top:53vh;left:0;width:100%;height:1.5px;
  background:rgba(236,231,218,.20);
  box-shadow:0 0 18px rgba(238,232,218,.09);
  filter:blur(.7px);
  opacity:calc(1 - var(--p)*1.75);
}
.seaSurface{z-index:2;
  position:absolute;left:0;right:0;top:53vh;height:36vh;
  background:
    linear-gradient(to bottom,rgba(24,96,112,.10),rgba(0,32,44,.38)),
    url("assets/images/home/home-embedded-02.png");
  background-size:cover;
  background-position:center top;
  animation:surfaceDrift 18s linear infinite;
  opacity:calc(1 - var(--p)*.48);
}
@keyframes surfaceDrift{
  from{background-position:0 0,0 0,0 0}
  to{background-position:90px 22px,-60px 0,0 0}
}
.waterColumn{z-index:1;
  position:absolute;left:0;right:0;top:86vh;height:157vh;
  background:
    linear-gradient(to bottom,
      rgba(12,76,91,.12) 0%,
      rgba(7,54,70,.30) 26%,
      rgba(3,34,48,.58) 55%,
      rgba(1,16,25,.84) 82%,
      #000 100%),
    url("assets/images/home/home-embedded-02.png");
  background-size:cover;
  background-position:center top;
  filter:saturate(.82) brightness(.76);
}

.waveSurface{
  position:absolute;
  left:0;
  top:49.4vh;
  width:100%;
  height:8.6vh;
  object-fit:fill;
  object-position:center top;
  z-index:34;
  pointer-events:none;
  opacity:.88;
  filter:saturate(.92) contrast(1.05) brightness(.95);
}

.depthOverlay{
  position:fixed;inset:0;pointer-events:none;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,.03) 32%,
      rgba(0,0,0,.10) 58%,
      rgba(0,0,0,.18) 100%);
  opacity:calc(var(--p)*.55);
}

.blackBuffer{
  position:absolute;
  left:0;right:0;
  top:112vh;
  height:142vh;
  pointer-events:none;
  z-index:0;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,.06) 14%,
      rgba(0,0,0,.18) 29%,
      rgba(0,0,0,.42) 48%,
      rgba(0,0,0,.72) 68%,
      rgba(0,0,0,.92) 84%,
      #000 100%);
}

.vignette{
  position:fixed;inset:-10%;pointer-events:none;
  background:radial-gradient(circle at 50% 43%,transparent 0 43%,rgba(0,0,0,.40) 76%,rgba(0,0,0,.84) 100%);
  opacity:.72;
}
.name{
  position:fixed;top:18px;left:22px;z-index:80;
  padding:10px 15px;
  background:rgba(0,0,0,.12);
  backdrop-filter:blur(3px);
  border-radius:999px;
  letter-spacing:.30em;font-size:13px;
  color:rgba(255,255,255,.88);
  text-shadow:0 1px 6px rgba(0,0,0,.55);
  text-decoration:none;
}
.navTop{
  position:fixed;top:18px;right:22px;z-index:80;display:flex;gap:28px;align-items:center;
  padding:10px 15px;
  background:rgba(0,0,0,.12);
  backdrop-filter:blur(3px);
  border-radius:999px;
}
.navTop a{
  font-size:13px;letter-spacing:.30em;text-transform:uppercase;text-decoration:none;
  color:rgba(255,255,255,.88);border-bottom:1px solid transparent;padding-bottom:5px;
  text-shadow:0 1px 6px rgba(0,0,0,.55);
}

.birdLayer{position:absolute;left:0;right:0;top:0;height:100vh;z-index:40;pointer-events:none}
.birdWrap{
  position:absolute;width:250px;top:18vh;left:115vw;
  transform-origin:50% 50%;filter:drop-shadow(0 16px 24px rgba(0,0,0,.45));
  cursor:pointer;pointer-events:auto;opacity:0;
}
.birdWrap img{width:100%;display:block;user-select:none;-webkit-user-drag:none}
.birdWrap.flipped img{transform:scaleX(-1)}
.mouthStone{
  position:absolute;width:16px;height:16px;
  background-size:contain;background-repeat:no-repeat;background-position:center;
  transform:translate(-50%,-50%);
  z-index:3;pointer-events:none;
  filter:drop-shadow(0 5px 7px rgba(0,0,0,.50));
}
.birdWrap.noMouthStone .mouthStone{opacity:0}

.splash{
  position:fixed;left:50%;top:49%;width:180px;height:38px;
  transform:translate(-50%,-50%);z-index:60;opacity:0;pointer-events:none
}
.splash.on{animation:splash 1.28s ease-out}
@keyframes splash{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.15)}
  18%{opacity:.8}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.9)}
}
.splash:before,.splash:after{
  content:"";position:absolute;inset:0;border:1px solid rgba(235,235,220,.40);
  border-radius:50%;filter:blur(.45px)
}
.splash:after{inset:9px 24px;border-color:rgba(235,235,220,.22)}


.splashArt{
  position:fixed;
  left:50%;
  top:50.5%;
  width:210px;
  height:210px;
  object-fit:contain;
  z-index:96;
  pointer-events:none;
  opacity:0;
  transform:translate(-50%,-82%) scale(1);
  filter:drop-shadow(0 5px 8px rgba(0,0,0,.35));
}
.splashArt.on{
  opacity:1;
}

.fallingStone{
  position:absolute;
  width:16px;height:16px;
  background-size:contain;background-repeat:no-repeat;background-position:center;
  transform:translate(-50%,-50%) scale(var(--s,1)) rotate(var(--r,0deg));
  opacity:var(--o,1);
  filter:drop-shadow(0 12px 14px rgba(0,0,0,.62));
  z-index:95;pointer-events:none;
}

.starfield{
  position:absolute;
  left:0;right:0;
  top:168vh;
  height:76vh;
  z-index:12;
  pointer-events:none;
}
.star{
  position:absolute;border-radius:50%;
  background:rgba(231,230,219,.72);
  box-shadow:0 0 8px rgba(218,224,224,.25);
  animation:drift var(--dur) ease-in-out infinite alternate;
  opacity:0;
}
body.nearBottom .star{opacity:var(--starOpacity,.86)}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(var(--dx),var(--dy))}}
@keyframes newStarBirth{
  0%{opacity:0; transform:scale(0.15)}
  20%{opacity:1; transform:scale(2.6)}
  55%{opacity:.88; transform:scale(1.35)}
  100%{opacity:var(--starOpacity,.86); transform:scale(1)}
}
.star.newborn{
  animation:newStarBirth 1.25s ease-out forwards, drift var(--dur) ease-in-out 1.25s infinite alternate;
}

.hint{
  position:fixed;left:50%;top:13%;transform:translate(-50%,-50%);
  z-index:120;text-align:center;font-size:16px;letter-spacing:.13em;
  text-transform:lowercase;
  color:rgba(12,28,32,.82);transition:.6s;opacity:calc(var(--hint) * .98);
  pointer-events:none;line-height:1.85;font-weight:600;
  text-shadow:0 0 1px rgba(255,255,255,.95),0 1px 7px rgba(255,255,255,.72),0 1px 2px rgba(0,0,0,.16);
  background:radial-gradient(ellipse at center,rgba(250,248,239,.58) 0%,rgba(250,248,239,.34) 42%,rgba(250,248,239,0) 72%);
  padding:12px 34px;
  max-width:min(420px,82vw);
}
.hint span{font-size:13px!important;opacity:.86!important;font-weight:500!important}.bottomText{
  position:absolute;left:0;right:0;top:calc(780vh - 13vh);z-index:75;text-align:center;
  color:rgba(255,255,255,.66);letter-spacing:.18em;padding:0 24px 7vh;
  opacity:var(--end);transition:opacity .2s;font-weight:400;
  text-shadow:0 1px 8px rgba(0,0,0,.75),0 0 20px rgba(0,0,0,.45);
}
.bottomText .countLine{font-size:10px;margin-bottom:10px;letter-spacing:.18em;opacity:.58}
.bottomText .poem{font-size:10px;line-height:1.55;letter-spacing:.19em;opacity:.64}



@media(max-width:720px){
  body{height:820vh}

  .name{
    top:14px;
    left:14px;
    max-width:calc(100vw - 28px);
    font-size:10px;
    letter-spacing:.22em;
    padding:8px 10px;
    white-space:nowrap;
  }

  .navTop{
    top:50px;
    left:14px;
    right:auto;
    display:flex;
    flex-wrap:nowrap;
    gap:16px;
    max-width:calc(100vw - 28px);
    padding:8px 10px;
  }

  .navTop a{
    font-size:10px;
    letter-spacing:.16em;
    padding-bottom:3px;
  }

  .birdWrap{width:115px}

  .hint{
    top:18%;
    font-size:12px;
    letter-spacing:.10em;
    padding:9px 20px;
    max-width:78vw;
  }

  .hint span{font-size:10px!important}

  .bottomText{
    position:fixed !important;
    left:0 !important;
    right:0 !important;
    bottom:7vh !important;
    top:auto !important;
    z-index:75 !important;
  }

  .bottomText .countLine{
    font-size:9px;
    letter-spacing:.13em;
  }

  .bottomText .poem{
    font-size:9px;
    line-height:1.55;
  }

  .starfield{
    position:fixed !important;
    left:0 !important;
    right:0 !important;
    top:55vh !important;
    height:34vh !important;
    z-index:68 !important;
    pointer-events:none !important;
    transform:none !important;
  }

  .star{
    width:2.4px !important;
    height:2.4px !important;
    background:rgba(245,244,232,.92) !important;
    box-shadow:0 0 8px rgba(245,244,232,.55) !important;
  }

  body.nearBottom .star{
    opacity:var(--starOpacity,.95) !important;
  }

  body:not(.nearBottom) .star{
    opacity:0 !important;
  }

  .splashArt{
    width:170px;
    height:170px;
  }

  .waveSurface{
    top:49.4vh;
    height:8.6vh;
  }
}
.homeLoader{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 50% 40%,rgba(255,255,255,.72),rgba(238,244,242,.82) 56%,rgba(216,230,230,.90) 100%);
  color:rgba(24,52,58,.64);
  font-size:13px;
  letter-spacing:.18em;
  line-height:1.8;
  text-transform:lowercase;
  transition:opacity .75s ease,visibility .75s ease;
  pointer-events:none;
}
.homeLoader span{animation:loaderBreath 2.2s ease-in-out infinite}
.homeLoader.isHidden{opacity:0;visibility:hidden}
@keyframes loaderBreath{0%,100%{opacity:.42}50%{opacity:.78}}
</style>
</head>
<body>

<script>
(()=>{const loader=document.getElementById('homeLoader');if(!loader)return;let hidden=false;const hide=()=>{if(hidden)return;hidden=true;loader.classList.add('isHidden');setTimeout(()=>loader.remove(),900)};window.addEventListener('load',hide,{once:true});setTimeout(hide,1600)})();
</script>

</div>

<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/stone-counter.js"></script>
<script>
const SEA_SURFACE_FRAMES=[
'assets/images/home/home-embedded-03.png',
'assets/images/home/home-embedded-04.png',
'assets/images/home/home-embedded-05.png'
];
const SPLASH_FRAMES=[
'assets/images/home/home-embedded-06.png',
'assets/images/home/home-embedded-07.png',
'assets/images/home/home-embedded-08.png'
];
const STONES=[
'assets/images/home/home-embedded-09.png',
'assets/images/home/home-embedded-10.png',
'assets/images/home/home-embedded-11.png',
'assets/images/home/home-embedded-12.png',
'assets/images/home/home-embedded-13.png',
'assets/images/home/home-embedded-14.png',
'assets/images/home/home-embedded-15.png',
'assets/images/home/home-embedded-16.png',
'assets/images/home/home-embedded-17.png'
];
const FRAMES=[
'assets/images/home/home-embedded-18.png',
'assets/images/home/home-embedded-19.png',
'assets/images/home/home-embedded-20.png',
'assets/images/home/home-embedded-21.png',
'assets/images/home/home-embedded-22.png',
'assets/images/home/home-embedded-23.png',
'assets/images/home/home-embedded-24.png',
'assets/images/home/home-embedded-25.png',
'assets/images/home/home-embedded-26.png',
'assets/images/home/home-embedded-27.png',
'assets/images/home/home-embedded-28.png',
'assets/images/home/home-embedded-29.png',
'assets/images/home/home-embedded-30.png',
'assets/images/home/home-embedded-31.png',
'assets/images/home/home-embedded-32.png',
'assets/images/home/home-embedded-33.png'
];
const root=document.documentElement,world=document.querySelector('.world'),bird=document.getElementById('bird'),birdImg=document.getElementById('birdImg'),mouthStone=document.getElementById('mouthStone'),splash=document.getElementById('splash'),starfield=document.getElementById('starfield'),count=document.getElementById('count');
const anchor={x:.0257,y:.8048};
const MAX_PERSISTENT_STARS_DESKTOP=360;
const MAX_PERSISTENT_STARS_MOBILE=160;
let local=Number(localStorage.getItem('jingweiV16Stones')||0);
count.textContent=local.toLocaleString('en-US');
window.addEventListener('stonecountchange',event=>{
  const value=Number(event.detail&&event.detail.count);
  if(!Number.isFinite(value))return;
  local=value;
  makeStars();
});
if(window.initStoneCounter){
  window.initStoneCounter({element:count,storageKey:'jingweiV16Stones'}).then(value=>{
    if(Number.isFinite(value)){local=value;makeStars();}
  }).catch(()=>{});
}

let frameIndex=0,lastFrameTime=0,frameDelay=75;
let direction='rtl',birdState='entering',phaseStart=performance.now(),canClick=false;
let firstEntry=true;
let floatSeedX=Math.random()*1000,floatSeedY=Math.random()*1000;
let activeStone=null;
let currentStoneIndex=0;

function seededRand(seed){const x=Math.sin(seed*127.1+311.7)*43758.5453;return x-Math.floor(x)}
function makeStars(){
  starfield.querySelectorAll('.persistent-star').forEach(star=>star.remove());
  const maxStars=window.matchMedia('(max-width:720px)').matches?MAX_PERSISTENT_STARS_MOBILE:MAX_PERSISTENT_STARS_DESKTOP;
  const total=Math.max(0,Math.floor(Number(local)||0));
  const displayStarCount=Math.min(total,maxStars);
  const firstStarIndex=Math.max(0,total-displayStarCount);
  const fragment=document.createDocumentFragment();
  for(let i=0;i<displayStarCount;i++){
    const starIndex=firstStarIndex+i;
    const s=document.createElement('span');
    s.className='star persistent-star';
    const size=(seededRand(starIndex+1)*1.15+1.05).toFixed(2);
    s.style.width=size+'px';s.style.height=size+'px';
    s.style.left=(4+seededRand(starIndex+20)*92).toFixed(2)+'%';
    s.style.top=(18+seededRand(starIndex+40)*54).toFixed(2)+'%';
    s.style.setProperty('--starOpacity',(0.68+seededRand(starIndex+60)*.24).toFixed(2));
    s.style.setProperty('--dx',(seededRand(starIndex+80)*4-2).toFixed(1)+'px');
    s.style.setProperty('--dy',(4+seededRand(starIndex+100)*7).toFixed(1)+'px');
    s.style.setProperty('--dur',(28+seededRand(starIndex+120)*26).toFixed(1)+'s');
    fragment.appendChild(s);
  }
  starfield.appendChild(fragment);
}
function addStarAt(xPct, topPx=null, newborn=true){
  const s=document.createElement('span');
  s.className='star' + (newborn ? ' newborn' : '');
  const size=(Math.random()*1.25+1.35).toFixed(2);
  s.style.width=size+'px';s.style.height=size+'px';
  s.style.left=xPct+'%';
  s.style.top=(topPx===null ? (24+Math.random()*48).toFixed(2)+'%' : topPx);
  s.style.setProperty('--starOpacity','.92');
  s.style.setProperty('--dx',(Math.random()*4-2).toFixed(1)+'px');
  s.style.setProperty('--dy',(4+Math.random()*7).toFixed(1)+'px');
  s.style.setProperty('--dur',(28+Math.random()*26).toFixed(1)+'s');
  starfield.appendChild(s);
  if(newborn)setTimeout(()=>s.remove(),2600);
}
function addStarAtViewportPoint(x,y,newborn=true){
  const fieldRect=starfield.getBoundingClientRect();
  if(!fieldRect.width||!fieldRect.height){
    addStarAt(50,'50%',newborn);
    return;
  }
  const xPct=Math.max(0,Math.min(100,((x-fieldRect.left)/fieldRect.width)*100));
  const yPct=Math.max(0,Math.min(100,((y-fieldRect.top)/fieldRect.height)*100));
  addStarAt(xPct.toFixed(2),yPct.toFixed(2)+'%',newborn);
}
function addWorldStarAt(xPct,worldYvh,newborn=true){
  const s=document.createElement('span');
  s.className='star' + (newborn ? ' newborn' : '');
  const size=(Math.random()*1.25+1.35).toFixed(2);
  s.style.width=size+'px';s.style.height=size+'px';
  s.style.left=xPct+'%';
  s.style.top=worldYvh+'vh';
  s.style.zIndex='96';
  s.style.setProperty('--starOpacity','.92');
  s.style.setProperty('--dx',(Math.random()*4-2).toFixed(1)+'px');
  s.style.setProperty('--dy',(4+Math.random()*7).toFixed(1)+'px');
  s.style.setProperty('--dur',(28+Math.random()*26).toFixed(1)+'s');
  world.appendChild(s);
  if(newborn)setTimeout(()=>s.remove(),2600);
}

function easeInOutCubic(x){return x<.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2}
function smootherstep(t){return t*t*t*(t*(t*6-15)+10)}
function lerp(a,b,t){return a+(b-a)*t}
function starLocalTopFromWorldY(worldY){
  // starfield is positioned in the same .world coordinates.
  // Convert absolute world vh into local percent inside starfield.
  const starTop=168;
  const starHeight=76;
  const pct=((worldY-starTop)/starHeight)*100;
  return Math.max(0,Math.min(100,pct));
}
function currentCameraYvh(){return -((Math.min(1,window.scrollY/(document.documentElement.scrollHeight-innerHeight)))*132)}
function smoothFloat(now){
  const s=now/1000;
  return {
    x:
      Math.sin(s*.41+floatSeedX)*1.9+
      Math.sin(s*.17+floatSeedX*.31)*2.4+
      Math.sin(s*.071+floatSeedX*.77)*1.1,
    y:
      Math.sin(s*.50+floatSeedY)*4.2+
      Math.sin(s*.21+floatSeedY*.27)*4.6+
      Math.sin(s*.073+floatSeedY*.63)*2.1
  };
}
function setMouthStone(){
  mouthStone.style.left=(direction==='rtl'?anchor.x*100:(1-anchor.x)*100)+'%';
  mouthStone.style.top=(anchor.y*100)+'%';
}
function setBird(xvw,yvh,opacity=1,tilt=0){
  // No hard/soft clamp here: the base flight height is high enough,
  // so Jingwei can keep her free floating movement.
  bird.style.left=xvw+'vw';bird.style.top=yvh+'vh';bird.style.opacity=opacity;
  bird.style.transform='translate(-50%,-50%) rotate('+tilt+'deg)';
  bird.classList.toggle('flipped',direction==='ltr');
}
function startCycle(dir){
  direction=dir;birdState='entering';phaseStart=performance.now();canClick=false;
  bird.classList.remove('noMouthStone');setMouthStone();applyMouthStone();
  document.getElementById('hint').innerHTML='WAIT FOR THE BIRD<br><span style="font-size:10px;opacity:.62">CLICK WHEN SHE ARRIVES</span>';
}
function chooseFinalX(start){
  const r=Math.random();
  if(r<.33)return 4+Math.random()*25;
  if(r<.66)return 71+Math.random()*25;
  return 38+Math.random()*24;
}
function pickStone(){
  return Math.floor(Math.random()*STONES.length);
}
function applyMouthStone(){
  currentStoneIndex=pickStone();
  mouthStone.style.backgroundImage='url("'+STONES[currentStoneIndex]+'")';
}


const splashArt=document.getElementById('splashArt');
function playSplashArt(x=null,y=null){
  if(!splashArt || !SPLASH_FRAMES.length) return;
  if(x!==null && y!==null){
    splashArt.style.left=x+'px';
    splashArt.style.top=y+'px';
  }
  let i=0;
  splashArt.classList.add('on');
  function step(){
    if(i < SPLASH_FRAMES.length){
      splashArt.src=SPLASH_FRAMES[i++];
      setTimeout(step,55);
    }else{
      setTimeout(()=>splashArt.classList.remove('on'),90);
    }
  }
  step();
}

function dropStone(){
  if(!canClick||birdState!=='hovering')return;
  const rect=mouthStone.getBoundingClientRect();
  let sx=((rect.left+rect.width/2)/window.innerWidth)*100;
  let sy=((rect.top+rect.height/2)/window.innerHeight)*100;
  if(!Number.isFinite(sx)||!Number.isFinite(sy)||rect.width<1||rect.height<1||(sx<1&&sy<1)){
    const br=bird.getBoundingClientRect();
    const mx=direction==='rtl'?anchor.x:(1-anchor.x);
    sx=((br.left+br.width*mx)/window.innerWidth)*100;
    sy=((br.top+br.height*anchor.y)/window.innerHeight)*100;
  }
  sy=Math.max(50,sy);
  const startWorldY = sy - currentCameraYvh();
  const finalX=chooseFinalX(sx);
  const finalWorldY = 216; // 鎺ヨ繎鍙娣辨捣搴曢儴锛屽拰鑳屾櫙涓€璧风Щ鍔?
  const el=document.createElement('div');
  el.className='fallingStone';
  el.style.backgroundImage='url("'+STONES[currentStoneIndex]+'")';
  el.style.setProperty('--r',(Math.random()*70-35).toFixed(1)+'deg');
  world.appendChild(el);
  activeStone={el,startTime:performance.now(),sx,startWorldY,finalX,finalWorldY,phase:Math.random()*Math.PI*2,done:false,splashPlayed:false};
  bird.classList.add('noMouthStone');

  birdState='dropping';canClick=false;phaseStart=performance.now();
  if(window.incrementStoneCount){
    window.incrementStoneCount().then(value=>{
      if(Number.isFinite(value)) local=value;
    }).catch(()=>{});
  }else{
    local++;localStorage.setItem('jingweiV16Stones',local);count.textContent=local.toLocaleString('en-US');
  }
  splash.classList.remove('on');void splash.offsetWidth;splash.classList.add('on');
  document.getElementById('hint').innerHTML='SCROLL DOWN<br><span style="font-size:10px;opacity:.62">FOLLOW THE STONE INTO THE SEA</span>';
  setTimeout(()=>{birdState='recovering';phaseStart=performance.now()},1100);
}
bird.addEventListener('click',dropStone);

function updateBird(now){
  const elapsed=(now-phaseStart)/1000,hoverX=direction==='rtl'?52:48,baseY=33,off=smoothFloat(now);
  if(birdState==='entering'){
    const entryDuration=firstEntry?(window.matchMedia('(max-width:720px)').matches?1.05:1.75):7.4;
    const t=Math.min(1,elapsed/entryDuration),e=easeInOutCubic(t),from=direction==='rtl'?118:-18;
    const travelWave =
      Math.sin(t*Math.PI*2.2 + floatSeedY)*5.0 +
      Math.sin(t*Math.PI*4.1 + floatSeedX*.37)*2.8;
    setBird(
      lerp(from,hoverX,e)+off.x,
      baseY+off.y+travelWave*Math.sin(Math.PI*t),
      Math.min(1,t*3),
      lerp(direction==='rtl'?-3:3,0,e)+Math.sin(now/1400)*1.8
    );
    if(t>=1){birdState='hovering';phaseStart=now;canClick=true;firstEntry=false}
  }else if(birdState==='hovering'){
    setBird(hoverX+off.x,baseY+off.y,1,Math.sin(now/1000)*2.0);
  }else if(birdState==='dropping'){
    const t=Math.min(1,elapsed/1.1),tiltTarget=direction==='rtl'?-45:45;
    setBird(hoverX+off.x,baseY+off.y,1,lerp(0,tiltTarget,easeInOutCubic(t)));
  }else if(birdState==='recovering'){
    const t=Math.min(1,elapsed/1.15),tiltStart=direction==='rtl'?-45:45;
    setBird(hoverX+off.x,baseY+off.y,1,lerp(tiltStart,0,easeInOutCubic(t)));
    if(t>=1){birdState='leaving';phaseStart=now}
  }else if(birdState==='leaving'){
    const t=Math.min(1,elapsed/6.8),e=easeInOutCubic(t),to=direction==='rtl'?-20:120;
    const travelWave =
      Math.sin(t*Math.PI*2.0 + floatSeedY*.73)*5.2 +
      Math.sin(t*Math.PI*3.7 + floatSeedX*.41)*2.6;
    setBird(
      lerp(hoverX,to,e)+off.x,
      baseY+off.y-e*1+travelWave*Math.sin(Math.PI*t),
      1-t*.65,
      lerp(0,direction==='rtl'?-4:4,e)+Math.sin(now/1200)*1.35
    );
    if(t>=1){birdState='waiting';phaseStart=now;setBird(to,baseY,0,0)}
  }else if(birdState==='waiting'){
    if(elapsed>=10)startCycle(direction==='rtl'?'ltr':'rtl');
  }
}
function updateStone(now){
  if(!activeStone||activeStone.done)return;
  const seconds=(now-activeStone.startTime)/1000;

  const p=Math.min(1,seconds/28);
  if(!activeStone.splashPlayed && seconds>=0.55){
    activeStone.splashPlayed=true;
    const r=activeStone.el.getBoundingClientRect();
    playSplashArt(r.left+r.width/2, r.top+r.height/2);
  }
  const airPull = 1 - Math.exp(-7.2*p);       // fast at the beginning
  const deepDrift = smootherstep(p);          // 鍚庢鎱㈡參杩涘叆娣卞
  const e = 0.34*airPull + 0.66*deepDrift;    // 涓や釜鏇茬嚎娣峰悎锛岄€熷害鏇磋繛缁?
  const worldY=lerp(activeStone.startWorldY,activeStone.finalWorldY,e);

  const drift=smootherstep(p);
  const wave=Math.sin(seconds*.16+activeStone.phase)*(0.22+p*.85);
  const wave2=Math.sin(seconds*.055+activeStone.phase*1.7)*(0.10+p*.45);
  const x=lerp(activeStone.sx,activeStone.finalX,drift)+wave+wave2;

  let scale=p<.90?1-(p/.90)*.18:.82-easeInOutCubic((p-.90)/.10)*.76;
  let opacity=p<.93?1-p*.10:Math.max(.18,1-easeInOutCubic((p-.93)/.07)*.72);

  activeStone.el.style.left=x+'%';
  activeStone.el.style.top=worldY+'vh';
  activeStone.el.style.setProperty('--s',Math.max(.07,scale).toFixed(3));
  activeStone.el.style.setProperty('--o',opacity.toFixed(3));

  if(p>=1){
    const finalRect=activeStone.el.getBoundingClientRect();
    const worldRect=world.getBoundingClientRect();
    const finalScreenX=finalRect.left+finalRect.width/2;
    const finalScreenY=finalRect.top+finalRect.height/2;
    const finalWorldX=Math.max(0,Math.min(100,((finalScreenX-worldRect.left)/worldRect.width)*100)).toFixed(2);
    const finalWorldY=((finalScreenY-worldRect.top)/window.innerHeight*100).toFixed(2);
    // Become a star exactly where the stone disappears.
    activeStone.el.remove();
    activeStone.done=true;
    activeStone=null;
    addWorldStarAt(finalWorldX, finalWorldY, true);
  }
}

function updateScroll(){
  const max=document.documentElement.scrollHeight-innerHeight,p=Math.min(1,scrollY/max);
  root.style.setProperty('--p',p.toFixed(4));
  root.style.setProperty('--end',Math.max(0,(p-.935)/.035).toFixed(3));
  root.style.setProperty('--hint',Math.max(0,1-p*5).toFixed(3));
  root.style.setProperty('--cameraY',(-p*132).toFixed(2)+'vh');
  document.body.classList.toggle('nearBottom',p>.82);
}
window.addEventListener('scroll',updateScroll,{passive:true});
function tick(now){
  if(now-lastFrameTime>frameDelay){birdImg.src=FRAMES[frameIndex];frameIndex=(frameIndex+1)%FRAMES.length;lastFrameTime=now}
  updateBird(now);updateStone(now);
requestAnimationFrame(tick);
}

const waveSurface=document.getElementById('waveSurface');
const waveSequence=[0,1,2,1];
const waveDelays=[520,320,520,320];
let waveStep=0;

function animateWaveSurface(){
  if(waveSurface && SEA_SURFACE_FRAMES.length){
    waveSurface.src = SEA_SURFACE_FRAMES[waveSequence[waveStep] % SEA_SURFACE_FRAMES.length];
  }
  const delay = waveDelays[waveStep] || 420;
  waveStep = (waveStep + 1) % waveSequence.length;
  setTimeout(animateWaveSurface, delay);
}
animateWaveSurface();


function prepareMobileStarfield(){
  if(window.matchMedia('(max-width:720px)').matches && starfield && starfield.parentElement !== document.body){
    document.body.appendChild(starfield);
  }
}
prepareMobileStarfield();
window.addEventListener('resize', prepareMobileStarfield);

makeStars();setMouthStone();startCycle('rtl');updateScroll();requestAnimationFrame(tick);
</script>
