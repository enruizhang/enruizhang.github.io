<head>

<title>Water Tank II — Enrui Zhang</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;color:#292d2e;font-family:Georgia,'Times New Roman',serif}
body{padding:0 28px 9vh;background-color:#f6f8f6;background-image:linear-gradient(rgba(249,250,247,.82),rgba(246,249,248,.86)),url("IMG_0925.PNG");background-position:center,center top;background-size:cover,cover;background-repeat:no-repeat,no-repeat;background-attachment:fixed,fixed}
.name{position:fixed;top:18px;left:22px;z-index:20;padding:10px 15px;background:rgba(246,248,246,.74);backdrop-filter:blur(5px);border:1px solid rgba(57,67,69,.09);border-radius:999px;letter-spacing:.30em;font-size:13px;color:rgba(28,34,35,.82);text-decoration:none}
.navTop{position:fixed;top:18px;right:22px;z-index:20;display:flex;gap:28px;align-items:center;padding:10px 15px;background:rgba(246,248,246,.74);backdrop-filter:blur(5px);border:1px solid rgba(57,67,69,.09);border-radius:999px}
.navTop a{font-size:13px;letter-spacing:.30em;text-transform:uppercase;text-decoration:none;color:rgba(28,34,35,.82);padding-bottom:5px}
.workPage{width:min(88vw,1480px);min-height:100vh;margin:0 auto;padding-top:118px;display:grid;grid-template-columns:minmax(0,2.2fr) minmax(240px,.8fr);gap:6vw;align-items:center}
.gallery{min-width:0}.imageFrame{width:100%;height:min(72vh,760px);display:flex;align-items:center;justify-content:center;background:transparent;border:0}
.imageFrame img{display:block;width:100%;height:100%;object-fit:contain}
.detailThumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.detailThumb{width:58px;height:58px;padding:0;overflow:hidden;background:transparent;border:0;cursor:pointer}.detailThumb img{display:block;width:100%;height:100%;object-fit:contain}
.workInfo{padding:24px 0}.backLink{display:inline-block;margin-bottom:36px;color:rgba(35,50,52,.62);font-size:11px;letter-spacing:.16em;text-decoration:none}.workInfo h1{margin:0 0 42px;font-size:24px;font-weight:400;line-height:1.35;letter-spacing:.05em}.details{margin:0;padding:0;list-style:none;font-size:14px;line-height:2;color:rgba(35,48,50,.72)}
@media(max-width:720px){body{padding:0 14px 8vh;overflow-x:hidden;background-attachment:scroll,scroll}.name{top:14px;left:14px;font-size:10px;letter-spacing:.24em;padding:8px 10px;white-space:nowrap}.navTop{top:52px;left:14px;right:auto;gap:12px;padding:8px 10px;max-width:calc(100vw - 28px);flex-wrap:wrap}.navTop a{font-size:10px;letter-spacing:.18em;padding-bottom:3px}.workPage{width:100%;padding-top:132px;grid-template-columns:1fr;gap:28px;align-items:start}.imageFrame{height:62vh;max-height:620px}.workInfo{padding:0}.backLink{margin-bottom:24px}.workInfo h1{font-size:21px;margin-bottom:28px}}

</head>
<body>
<a class="name" href="index.html">ENRUI ZHANG</a>

<main class="workPage">
  <div class="gallery"><div class="imageFrame"><img decoding="async" id="mainImage" src="assets/images/other-stones/water-tank-ii-main.jpeg" alt="Water Tank II"></div></div>
  <section class="workInfo"><a class="backLink" href="other-stones.html">Back to Other Stones</a><h1>Water Tank II</h1><ul class="details"><li>2026</li><li>Oil Pastel, Colored Pencil</li></ul></section>
</main>
<script>
const mainImage=document.getElementById('mainImage');
document.querySelectorAll('.detailThumb').forEach(thumb=>{
  const update=()=>{mainImage.src=thumb.dataset.src;mainImage.alt=thumb.dataset.alt};
  thumb.addEventListener('mouseenter',update);
  thumb.addEventListener('focus',update);
  thumb.addEventListener('click',update);
});
</script>
