<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Work 鈥?Enrui Zhang</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:#000;
  color:#e8e4db;
  font-family:Georgia,'Times New Roman',serif;
}
.name{
  position:fixed;top:18px;left:22px;z-index:10;
  padding:10px 15px;
  background:rgba(255,255,255,.04);
  border-radius:999px;
  letter-spacing:.30em;font-size:13px;
  color:rgba(255,255,255,.88);
  text-decoration:none;
}
.navTop{
  position:fixed;top:18px;right:22px;z-index:10;
  display:flex;gap:28px;align-items:center;
  padding:10px 15px;
  background:rgba(255,255,255,.04);
  border-radius:999px;
}
.navTop a{
  font-size:13px;letter-spacing:.30em;text-transform:uppercase;
  text-decoration:none;color:rgba(255,255,255,.88);
  border-bottom:1px solid transparent;padding-bottom:5px;
}
.workStage,.layers{
  position:fixed;
  inset:0;
  overflow:hidden;
}
.layers{
  z-index:0;
  pointer-events:none;
  background:#fff;
  isolation:isolate;
}
.layer{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  mix-blend-mode:multiply;
  filter:grayscale(100%);
  transition:filter .6s ease;
}
.skyLayer{z-index:1}
.seaLayer{z-index:2}
.stonesLayer{z-index:3}
.area{
  position:absolute;
  left:0;
  width:100%;
  height:50%;
  z-index:5;
  cursor:pointer;
}
.jingweiArea{top:0}
.stonesArea{bottom:0}
.label{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
  letter-spacing:.30em;
  color:rgba(255,255,255,.88);
  opacity:.9;
  text-shadow:0 1px 3px rgba(0,0,0,.28);
  white-space:nowrap;
  pointer-events:none;
  transition:opacity .3s ease;
}
.jingweiLabel{top:60%}
.stonesLabel{top:60%}
.area:hover .label,
.area:focus-visible .label{
  opacity:1;
}
.jingweiArea:hover~.layers .skyLayer,
.jingweiArea:focus-visible~.layers .skyLayer{
  filter:grayscale(0%);
}
.stonesArea:hover~.layers .seaLayer,
.stonesArea:hover~.layers .stonesLayer,
.stonesArea:focus-visible~.layers .seaLayer,
.stonesArea:focus-visible~.layers .stonesLayer{
  filter:grayscale(0%);
}
@media(max-width:720px){
  .name{
    top:14px;left:14px;
    max-width:calc(100vw - 28px);
    font-size:10px;letter-spacing:.24em;
    padding:8px 10px;white-space:nowrap;
  }
  .navTop{
    top:52px;left:14px;right:auto;
    flex-wrap:wrap;gap:12px;
    max-width:calc(100vw - 28px);
    padding:8px 10px;
  }
  .navTop a{
    font-size:10px;
    letter-spacing:.18em;
    padding-bottom:3px;
  }
}
</style>
</head>
<body>
<main class="workStage">
  <a class="area jingweiArea" href="jingwei.html" aria-label="Jingwei"><span class="label jingweiLabel">Jingwei</span></a>
  <a class="area stonesArea" href="other-stones.html" aria-label="Other Stones"><span class="label stonesLabel">Other Stones</span></a>
  <div class="layers" aria-hidden="true">
    <img decoding="async" class="layer skyLayer" src="work-sky.png" alt="">
    <img decoding="async" class="layer seaLayer" src="work-sea.png" alt="">
    <img decoding="async" class="layer stonesLayer" src="work-stones.png" alt="">
  </div>
</main>
<a class="name" href="index.html">ENRUI ZHANG</a>
  <nav class="navTop"><a href="work.html">Work</a><a href="about.html">About</a><a href="cv.html">CV</a></nav>
</body>
</html>
