<script>
document.querySelectorAll('.about').forEach(about=>{
  const toggle=about.querySelector('.aboutToggle');
  toggle.addEventListener('click',()=>{
    const open=about.classList.toggle('open');
    toggle.setAttribute('aria-expanded',String(open));
    toggle.textContent=open?'收起':'展开';
  });
});

const featuredOtherStonesVideo=document.getElementById('featuredOtherStonesVideo');
const otherStonesVideoLink=document.getElementById('otherStonesVideoLink');
document.querySelectorAll('.videoThumb').forEach(item=>{
  const thumbVideo=item.querySelector('video');
  const update=()=>{
    if(featuredOtherStonesVideo.getAttribute('src')!==item.dataset.videoSrc){
      featuredOtherStonesVideo.pause();
      featuredOtherStonesVideo.src=item.dataset.videoSrc;
      featuredOtherStonesVideo.load();
    }
    featuredOtherStonesVideo.play().catch(()=>{});
    otherStonesVideoLink.href=item.href;
    otherStonesVideoLink.setAttribute('aria-label','View '+item.dataset.title);
  };
  item.addEventListener('mouseenter',()=>{update();thumbVideo.play().catch(()=>{})});
  item.addEventListener('mouseleave',()=>thumbVideo.pause());
  item.addEventListener('focus',update);
  item.addEventListener('click',update);
});

document.querySelectorAll('.notebookThumb[data-image]').forEach(item=>{
  const update=()=>{
    const preview=document.getElementById(item.dataset.previewTarget);
    const image=preview.querySelector('img');
    image.src=item.dataset.image;
    image.alt=item.dataset.title;
    preview.href=item.href;
  };
  item.addEventListener('mouseenter',update);
  item.addEventListener('focus',update);
  item.addEventListener('click',update);
});
</script>
