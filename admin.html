<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — Enrui Zhang</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Georgia,'Times New Roman',serif;color:rgba(28,34,35,.86)}
body{
  background:
    linear-gradient(rgba(255,255,255,.78),rgba(255,255,255,.84)),
    url("IMG_0925.PNG") center/cover fixed no-repeat;
}
.name{
  position:fixed;top:18px;left:22px;z-index:10;padding:10px 15px;
  letter-spacing:.30em;font-size:13px;color:rgba(32,43,45,.78);
  text-decoration:none;
}
.admin{
  width:min(760px,70vw);
  margin:0 auto;
  padding:14vh 0 18vh;
}
h1,h2{
  margin:0 0 34px;
  font-size:13px;
  font-weight:400;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:rgba(28,34,35,.68);
}
h2{margin-top:70px}
.status{
  margin:0 0 38px;
  min-height:1.5em;
  font-size:14px;
  line-height:1.7;
  color:rgba(28,34,35,.62);
}
.field{margin-bottom:26px}
label{
  display:block;
  margin-bottom:10px;
  font-size:12px;
  letter-spacing:.16em;
  color:rgba(28,34,35,.62);
}
input,textarea,select{
  width:100%;
  border:0;
  border-bottom:1px solid rgba(28,34,35,.28);
  background:transparent;
  padding:10px 0;
  font:15px/1.7 Georgia,'Times New Roman',serif;
  color:rgba(28,34,35,.86);
  outline:none;
}
textarea{min-height:120px;resize:vertical}
button{
  margin:10px 18px 0 0;
  border:0;
  border-bottom:1px solid rgba(28,34,35,.30);
  background:transparent;
  padding:8px 0 5px;
  font:13px Georgia,'Times New Roman',serif;
  letter-spacing:.20em;
  color:rgba(28,34,35,.76);
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:0 34px;
}
[hidden]{display:none!important}
@media(max-width:720px){
  .name{top:14px;left:14px;font-size:10px;letter-spacing:.22em;padding:8px 10px;white-space:nowrap}
  .admin{width:calc(100% - 44px);padding-top:82px}
  .grid{grid-template-columns:1fr;gap:0}
}
</style>
</head>
<body>
<a class="name" href="index.html">ENRUI ZHANG</a>
<main class="admin">
  <h1>Admin</h1>
  <p class="status" id="adminStatus">Checking Firebase…</p>

  <form id="adminLoginForm">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Log in</button>
    <button type="button" id="adminLogout" hidden>Log out</button>
  </form>

  <section id="adminPanel" hidden>
    <h2>New work</h2>
    <form id="workForm">
      <div class="grid">
        <div class="field">
          <label for="title">Title</label>
          <input id="title" name="title" type="text">
        </div>
        <div class="field">
          <label for="year">Year</label>
          <input id="year" name="year" type="text">
        </div>
        <div class="field">
          <label for="medium">Medium</label>
          <input id="medium" name="medium" type="text">
        </div>
        <div class="field">
          <label for="dimensions">Dimensions</label>
          <input id="dimensions" name="dimensions" type="text">
        </div>
        <div class="field">
          <label for="category">Category</label>
          <input id="category" name="category" type="text">
        </div>
        <div class="field">
          <label for="series">Series</label>
          <input id="series" name="series" type="text">
        </div>
      </div>
      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" name="description"></textarea>
      </div>
      <div class="field">
        <label for="imageUpload">Image upload</label>
        <input id="imageUpload" name="imageUpload" type="file" accept="image/*">
      </div>
      <div class="field">
        <label for="videoUpload">Video upload</label>
        <input id="videoUpload" name="videoUpload" type="file" accept="video/*">
      </div>
      <button type="submit">Save</button>
    </form>
  </section>
</main>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/admin-auth.js"></script>
</body>
</html>
